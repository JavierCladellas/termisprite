name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-package:
    name: Build Linux
    runs-on: ubuntu-latest

    permissions:
        contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: cmake --preset default -DCMAKE_BUILD_TYPE=Release

      - name: Build termisprite
        run: cmake --build --preset default --config Release -j $(nproc)

      - name: Build Debian Package (.deb)
        run: |
          cd build/default/
          cpack -G DEB

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/default/termisprite
            build/default/*.deb
            generate_release_notes: true

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset default -DCMAKE_BUILD_TYPE=Release

      - name: Build termisprite
        run: cmake --build --preset default --config Release -j $(sysctl -n hw.logicalcpu)

      - name: Rename macOS Binary
        run: mv build/default/src/termisprite build/default/termisprite-macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/default/termisprite-macos
